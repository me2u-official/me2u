name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install signaling server dependencies
        run: npm ci
        working-directory: ./server

      - name: Run signaling server tests
        run: npm test --if-present
        working-directory: ./server

      - name: Validate HTML
        uses: htmlhint/htmlhint-action@v1
        with:
          files: index.html

      - name: Validate CSS
        uses: stylelint/stylelint-action@v1
        with:
          files: styles.css

      - name: Lint JavaScript
        run: npx eslint app.js --no-eslintrc --env browser,es2022 --parser-options=ecmaVersion:2022,sourceType:module --no-inline-config --rule '{"no-unused-vars": "warn", "no-undef": "off"}'